<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; font-family:-apple-system,'Helvetica Neue',sans-serif; overflow:hidden; }

#map { position:fixed; inset:0; z-index:0; }

header {
position:fixed; top:0; left:0; right:0; z-index:100;
background:rgba(255,255,255,0.95);
backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
border-bottom:1px solid #e8e8e8;
box-shadow:0 1px 8px rgba(0,0,0,0.08);
padding:10px 14px 8px;
}
.header-top { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.logo { font-size:15px; font-weight:800; color:#e63312; }
.count { margin-left:auto; background:#e63312; color:#fff; border-radius:20px; padding:3px 11px; font-size:12px; font-weight:700; }

.filter-bar { display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; }
.filter-bar::-webkit-scrollbar { display:none; }
.fbtn {
flex-shrink:0; padding:5px 13px; border-radius:20px;
border:1.5px solid #ddd; background:#fff; color:#666;
font-size:12px; font-weight:700; cursor:pointer;
}
.f-all    { background:#222!important; border-color:#222!important; color:#fff!important; }
.f-gigo   { background:#0099cc!important; border-color:#0099cc!important; color:#fff!important; }
.f-round1 { background:#d4900a!important; border-color:#d4900a!important; color:#fff!important; }
.f-taito  { background:#8844cc!important; border-color:#8844cc!important; color:#fff!important; }
.f-other  { background:#e63312!important; border-color:#e63312!important; color:#fff!important; }

/* ポップアップ */
.leaflet-popup-content-wrapper {
border-radius:16px!important; padding:0!important; overflow:hidden;
box-shadow:0 6px 24px rgba(0,0,0,0.15)!important;
}
.leaflet-popup-content { margin:0!important; min-width:230px; }
.leaflet-popup-close-button { top:10px!important; right:10px!important; font-size:20px!important; color:#aaa!important; }
.pop { padding:14px 16px 12px; }
.pop-chain { font-size:11px; font-weight:700; margin-bottom:3px; }
.pop-name  { font-size:15px; font-weight:800; color:#111; line-height:1.3; margin-bottom:4px; }
.pop-addr  { font-size:12px; color:#888; line-height:1.5; }
.pop-btn   {
display:block; padding:12px; background:#e63312; color:#fff;
font-size:13px; font-weight:700; text-decoration:none; text-align:center;
}

/* ズームボタン */
.leaflet-control-zoom { border:none!important; box-shadow:0 2px 12px rgba(0,0,0,0.15)!important; }
.leaflet-control-zoom a { width:44px!important; height:44px!important; line-height:44px!important; font-size:22px!important; }
</style>

function getChain(name) {
  const n = name.replace(/[Ａ-Ｚａ-ｚ０-９]/g, c => String.fromCharCode(c.charCodeAt(0)-0xFEE0));
  if (/GiGO|GIGO/i.test(n)) return 'gigo';
  if (/ラウンドワン/.test(n)) return 'round1';
  if (/タイトー/.test(n)) return 'taito';
  return 'other';
}
function normName(s) {
  return s.replace(/[Ａ-Ｚａ-ｚ０-９]/g, c => String.fromCharCode(c.charCodeAt(0)-0xFEE0));
}
function makeIcon(chain) {
  const c = CHAIN_COLOR[chain];
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="38" viewBox="0 0 28 38">
    <path d="M14 2C7.9 2 3 7 3 13C3 21 14 36 14 36S25 21 25 13C25 7 20.1 2 14 2Z" fill="${c}" stroke="white" stroke-width="1.5"/>
    <circle cx="14" cy="13" r="5.5" fill="white"/>
  </svg>`;
  return L.divIcon({ html:svg, iconSize:[28,38], iconAnchor:[14,38], popupAnchor:[0,-40], className:'' });
}

// ヘッダー高さ分マップをずらす
function headerH() { return document.getElementById('hdr').getBoundingClientRect().height; }

const map = L.map('map', { zoomControl:false, tap:true })
  .setView([35.683, 139.650], 11);

L.control.zoom({ position:'bottomright' }).addTo(map);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom:19,
}).addTo(map);

// ヘッダー下から地図が始まるようパディング設定
function applyPadding() {
  map.invalidateSize();
  map.setView(map.getCenter(), map.getZoom());
}
setTimeout(() => {
  map.invalidateSize();
  const h = headerH();
  document.getElementById('map').style.top = h + 'px';
  map.invalidateSize();
}, 100);
window.addEventListener('resize', () => {
  const h = headerH();
  document.getElementById('map').style.top = h + 'px';
  map.invalidateSize();
});

let activeFilter = 'all';
const activeMarkers = [];

function buildMarkers() {
  activeMarkers.forEach(m => m.remove());
  activeMarkers.length = 0;
  let count = 0;
  STORES.forEach(s => {
    const chain = getChain(s.name);
    if (activeFilter !== 'all' && chain !== activeFilter) return;
    count++;
    const m = L.marker([s.lat, s.lng], { icon:makeIcon(chain) }).addTo(map);
    m.bindPopup(`
      <div class="pop">
        <div class="pop-chain" style="color:${CHAIN_COLOR[chain]}">${CHAIN_LABEL[chain]}</div>
        <div class="pop-name">${normName(s.name)}</div>
        <div class="pop-addr">📍 ${s.addr}</div>
      </div>
      <a class="pop-btn" href="https://maps.google.com/maps?q=${encodeURIComponent(normName(s.name)+' '+s.addr)}" target="_blank">Googleマップで開く →</a>
    `, { maxWidth:290, minWidth:230 });
    activeMarkers.push(m);
  });
  document.getElementById('cnt').textContent = count + '店舗';
}

document.getElementById('filterBar').addEventListener('click', e => {
  const btn = e.target.closest('.fbtn');
  if (!btn) return;
  activeFilter = btn.dataset.f;
  document.querySelectorAll('.fbtn').forEach(b => {
    b.className = 'fbtn';
    if (b.dataset.f === activeFilter) b.classList.add(FILTER_CLS[activeFilter]);
  });
  buildMarkers();
});

buildMarkers();
</script>
