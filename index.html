<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>オンゲキ 設置店舗マップ</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAyOCAzOCc+PHBhdGggZD0nTTE0IDJDNy45IDIgMyA3IDMgMTNDMyAyMSAxNCAzNiAxNCAzNlMyNSAyMSAyNSAxM0MyNSA3IDIwLjEgMiAxNCAyWicgZmlsbD0nI2U2MzMxMicgc3Ryb2tlPSd3aGl0ZScgc3Ryb2tlLXdpZHRoPScxLjUnLz48dGV4dCB4PScxNCcgeT0nMTMnIHRleHQtYW5jaG9yPSdtaWRkbGUnIGRvbWluYW50LWJhc2VsaW5lPSdjZW50cmFsJyBmb250LXNpemU9JzExJz7wn461PC90ZXh0Pjwvc3ZnPg==">
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"
      integrity="sha512-h9FcoyWjHcOcmEVkxOfTLnmZFWIH0iZhZT1H2TbOq55xssQGEJHEaIm+PgoUaZbRvQTNTluNOEfb1ZRy6D3BOw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"
        integrity="sha512-puJW3E/qXDqYp9IfhAI54BJEaWIfloJ7JWs7OeD5i6ruC9JZL1gERT1wjtwXFlh7CjE7ZJ+/vcRZRkIYIb6p4g=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer"></script>
<style>
:root {
  --hdr-h: 0px;
  --brand: #e63312;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; font-family:-apple-system,'Helvetica Neue',sans-serif; overflow:hidden; }

#map { position:absolute; top:var(--hdr-h); left:0; right:0; bottom:0; z-index:0; }

header {
  position:fixed; top:0; left:0; right:0; z-index:1000;
  background:rgba(255,255,255,0.95);
  backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid #e8e8e8;
  box-shadow:0 1px 8px rgba(0,0,0,0.08);
  padding:10px 14px;
}
.header-top { display:flex; align-items:center; gap:10px; }
.logo { font-size:15px; font-weight:800; color:var(--brand); }
.count { margin-left:auto; background:var(--brand); color:#fff; border-radius:20px; padding:3px 11px; font-size:12px; font-weight:700; }
.updated { font-size:10px; color:#999; }

.leaflet-popup-content-wrapper {
  border-radius:16px !important; padding:0 !important; overflow:hidden;
  box-shadow:0 6px 24px rgba(0,0,0,0.15) !important;
}
.leaflet-popup-content { margin:0 !important; min-width:230px; }
.leaflet-popup-close-button { top:10px !important; right:10px !important; font-size:20px !important; color:#aaa !important; }
.pop { padding:14px 16px 12px; }
.pop-name { font-size:15px; font-weight:800; color:#111; line-height:1.3; margin-bottom:4px; }
.pop-addr { font-size:12px; color:#888; line-height:1.5; }
.pop-btn {
  display:block; padding:12px; background:var(--brand); color:#fff;
  font-size:13px; font-weight:700; text-decoration:none; text-align:center;
}

.leaflet-control-zoom { border:none !important; box-shadow:0 2px 12px rgba(0,0,0,0.15) !important; }
.leaflet-control-zoom a { width:44px !important; height:44px !important; line-height:44px !important; font-size:22px !important; }

.loading {
  position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
  background:rgba(255,255,255,0.9); z-index:2000; font-size:14px; color:#666;
}
.error {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  background:#fff; border:1px solid var(--brand); border-radius:12px;
  padding:20px 24px; z-index:2000; max-width:90%;
  font-size:13px; color:#333; box-shadow:0 8px 32px rgba(0,0,0,0.15);
}
.error b { color:var(--brand); display:block; margin-bottom:6px; }
</style>
</head>
<body>

<div id="map"></div>

<header id="hdr">
  <div class="header-top">
    <div class="logo">🎵 オンゲキ 設置店舗</div>
    <div class="count" id="cnt">読み込み中…</div>
  </div>
</header>

<div class="loading" id="loading">店舗データを読み込み中…</div>

<script>
'use strict';

const BRAND = '#e63312';

const PIN_SVG =
  '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="38" viewBox="0 0 28 38">' +
  '<path d="M14 2C7.9 2 3 7 3 13C3 21 14 36 14 36S25 21 25 13C25 7 20.1 2 14 2Z" fill="' + BRAND + '" stroke="white" stroke-width="1.5"/>' +
  '<circle cx="14" cy="13" r="5.5" fill="white"/>' +
  '</svg>';
const PIN_ICON = L.divIcon({ html: PIN_SVG, iconSize:[28,38], iconAnchor:[14,38], popupAnchor:[0,-40], className:'' });

// XSS-safe popup builder: DOM API only, no innerHTML for store data
function buildPopup(store) {
  const root = document.createElement('div');

  const pop = document.createElement('div');
  pop.className = 'pop';

  const name = document.createElement('div');
  name.className = 'pop-name';
  name.textContent = store.name;
  pop.appendChild(name);

  const addr = document.createElement('div');
  addr.className = 'pop-addr';
  addr.textContent = '📍 ' + store.address;
  pop.appendChild(addr);

  root.appendChild(pop);

  const btn = document.createElement('a');
  btn.className = 'pop-btn';
  btn.href = 'https://maps.google.com/maps?q=' +
    encodeURIComponent(store.name + ' ' + store.address);
  btn.target = '_blank';
  btn.rel = 'noopener noreferrer';
  btn.textContent = 'Googleマップで開く →';
  root.appendChild(btn);

  return root;
}

const map = L.map('map', { zoomControl:false })
  .setView([35.6812, 139.7671], 11);

L.control.zoom({ position:'bottomright' }).addTo(map);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> | © <a href="https://www.openrailwaymap.org/">OpenRailwayMap</a> | データ: <a href="https://location.am-all.net/alm/location?gm=88">SEGA AM Location</a> | <a href="https://github.com/hikariri/ongeki-map">GitHub</a>',
  maxZoom: 19,
}).addTo(map);

L.tileLayer('https://{s}.tiles.openrailwaymap.org/standard/{z}/{x}/{y}.png', {
  opacity: 0.6,
  maxZoom: 19,
  subdomains: 'abc',
}).addTo(map);

const hdr = document.getElementById('hdr');
function syncHeader() {
  const h = hdr.getBoundingClientRect().height;
  document.documentElement.style.setProperty('--hdr-h', h + 'px');
  map.invalidateSize();
}
new ResizeObserver(syncHeader).observe(hdr);
syncHeader();

const layer = L.layerGroup().addTo(map);

function render(stores) {
  for (const s of stores) {
    L.marker([s.lat, s.lng], { icon: PIN_ICON })
      .bindPopup(buildPopup(s), { maxWidth:290, minWidth:230 })
      .addTo(layer);
  }
  document.getElementById('cnt').textContent = stores.length.toLocaleString() + '店舗';
}

function showError(msg) {
  const div = document.createElement('div');
  div.className = 'error';
  const b = document.createElement('b');
  b.textContent = '読み込みエラー';
  div.appendChild(b);
  div.appendChild(document.createTextNode(msg));
  document.body.appendChild(div);
}

(async () => {
  try {
    const res = await fetch('./stores.json', { cache: 'no-cache' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    render(data.stores);

    if (data.generated_at) {
      const d = new Date(data.generated_at);
      const ymd = d.getFullYear() + '/' +
        String(d.getMonth() + 1).padStart(2, '0') + '/' +
        String(d.getDate()).padStart(2, '0');
      const span = document.createElement('span');
      span.className = 'updated';
      span.textContent = '更新: ' + ymd;
      document.querySelector('.header-top').appendChild(span);
      syncHeader();
    }
  } catch (err) {
    showError('stores.json を読み込めませんでした。(' + err.message + ')');
  } finally {
    document.getElementById('loading').remove();
  }
})();
</script>

</body>
</html>
